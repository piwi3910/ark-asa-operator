name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/piwi3910/ark-asa-operator:${{ github.ref_name }}
      - name: Package and push Helm chart (OCI)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/ark-asa-operator/ --version "$VERSION" --app-version "$VERSION"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push "ark-asa-operator-${VERSION}.tgz" oci://ghcr.io/piwi3910/charts
      - name: Generate single-file manifest bundle
        run: |
          make manifests
          mkdir -p release
          (cat config/crd/bases/*.yaml; echo '---'; helm template ark-asa-operator deploy/helm/ark-asa-operator/) \
            > "release/ark-asa-operator-${GITHUB_REF_NAME}.yaml"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ark-asa-operator-*.tgz
            release/*.yaml
