name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - uses: golangci/golangci-lint-action@v6
        with: { version: latest }
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s: ['1.30.x', '1.32.x', '1.34.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - name: Run tests
        env:
          ENVTEST_K8S_VERSION: ${{ matrix.k8s }}
        run: make test
