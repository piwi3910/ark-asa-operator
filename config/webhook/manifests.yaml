---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-ark-watteel-com-v1alpha1-arkcluster
  failurePolicy: Fail
  name: varkcluster-v1alpha1.kb.io
  rules:
  - apiGroups:
    - ark.watteel.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - arkclusters
  sideEffects: None
